server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Ensure .mjs files are served with the correct MIME type so that
    # the PDF.js web worker is accepted by the browser.
    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html htm;
        image/svg+xml           svg svgz;
        image/png               png;
        image/jpeg              jpg jpeg;
        application/json        json;
        font/woff               woff;
        font/woff2              woff2;
    }

    # SPA fallback – route all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* requests to the FastAPI backend service
    location /api {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Allow generous timeout for file upload + processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Allow large PDF uploads (up to 200 MB)
        client_max_body_size 200m;
    }
}
